<!DOCTYPE html>
<html>
<head>
  <title>Student Search</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
      margin-top: 50px;
    }
    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: left;
      min-width: 300px;
    }
  </style>
</head>
<body>

<h2>🎓 Student Search</h2>

<input type="text" id="admission" placeholder="Enter Admission No">
<button onclick="search()">Search</button>

<div id="result">Enter admission number to see details</div>

<script>
function search() {
  let admission = document.getElementById("admission").value;

  fetch("https://script.google.com/macros/s/AKfycbyvlakWaWIit-u5BgV7nW7896KuxYNqRpewGOnJlfGNdEKEJE7ZNbnsQdL6p5XSE31R/exec?admission=" + admission)
    .then(res => res.text())
    .then(data => {
      document.getElementById("result").innerText = data;
    })
    .catch(() => {
      document.getElementById("result").innerText = "Error fetching data";
    });
}
</script>

</body>
</html>
